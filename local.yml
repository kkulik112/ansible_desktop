---
- hosts: localhost
  connection: local
  become: true
  gather_facts: true
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
    # --- MC ---
    - name: Install midnight commander
      package:
        name: mc
        state: present
     # --- Steam ---
    - name: Ensure multiverse repository is enabled
      apt_repository:
        repo: "deb http://archive.ubuntu.com/ubuntu {{ ansible_distribution_release }} multiverse"
        state: present
    - name: Install Steam
      apt:
        name: steam-installer
        state: present
    # --- Snap + Spotify ---
    - name: Install snapd
      apt:
        name: snapd
        state: present

    - name: Ensure snapd is running
      systemd:
        name: snapd
        enabled: yes
        state: started

    - name: Install Spotify via snap
      community.general.snap:
        name: spotify
        state: present

    
